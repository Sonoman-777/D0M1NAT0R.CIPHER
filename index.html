<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>D0M1NAT0R</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: monospace;
    background: #000;
    margin: 0;
    padding: 20px 10px;
    text-align: center;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #33FF99;
  }

  h1 {
    margin: 20px 0 30px;
    font-size: 2.4rem;
    text-shadow: 0 0 14px currentColor;
  }

  .theme-keller   { 
    --accent: #8AA3F4; 
    --accent-glow: #8AA3F466; 
    --dark-text: #2C4A8C;
  }
  .theme-blazer   { 
    --accent: #E63E3E; 
    --accent-glow: #E63E3E66; 
    --dark-text: #8B1F1F;
  }
  .theme-terron   { 
    --accent: #44FF4E; 
    --accent-glow: #44FF4E66; 
    --dark-text: #1E8A2E;
  }

  .accent-text    { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
  .accent-glow    { box-shadow: 0 0 16px var(--accent-glow); }

  .top-symbol {
    margin: 32px 0 10px;
    opacity: 0;
    animation: fadeIn 1.2s forwards;
  }

  .top-symbol img {
    height: 50px;
    width: auto;
    image-rendering: crisp-edges;
    filter: drop-shadow(0 0 8px var(--accent));
  }

  .content-wrapper {
    width: 100%;
    max-width: 1000px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: center;
  }

  .input-field {
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
  }

  textarea,
  .input-field input {
    width: 100%;
    background: #0a0a0a;
    color: var(--accent);
    border: 2px solid var(--accent);
    border-radius: 8px;
    padding: 14px;
    font-size: 18px;
    box-shadow: inset 0 0 12px var(--accent-glow);
  }

  textarea {
    height: 180px;
    resize: vertical;
    opacity: 0;
    animation: fadeIn 1.6s forwards 0.4s;
  }

  .input-field input {
    opacity: 0;
    animation: fadeIn 1.2s forwards 0.7s;
  }

  textarea:focus,
  .input-field input:focus {
    outline: none;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .buttons, .action-buttons {
    display: flex;
    justify-content: center;
    gap: 40px;
    opacity: 0;
    animation: fadeIn 1.2s forwards;
  }

  .main-btn, .action-btn {
    min-width: 220px;
    padding: 12px 24px;
    font-size: 16px;
    font-weight: bold;
    border: 2px solid var(--accent);
    border-radius: 6px;
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.25s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .main-btn:hover, .action-btn:hover {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 16px var(--accent-glow);
    transform: translateY(-1px);
  }

  .main-btn:active, .action-btn:active {
    transform: translateY(1px);
  }

  .examples-table {
    width: 100%;
    max-width: 1000px;
    border-collapse: collapse;
    margin-top: 70px;
    opacity: 0;
    animation: fadeIn 1.8s forwards 1s;
  }

  .examples-table th, .examples-table td {
    border: 2px solid var(--accent);
    padding: 32px 16px;
    text-align: left;
    font-size: 16px;
    vertical-align: top;
    word-break: break-word;
  }

  .examples-table th {
    background: rgba(0,0,0,0.6);
    color: var(--accent);
    text-transform: uppercase;
  }

  .examples-table td {
    color: var(--dark-text);
  }

  .examples-table td.original {
    background: #111;
    font-weight: bold;
    color: var(--dark-text);
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @media (max-width: 900px) {
    .buttons, .action-buttons { gap: 20px; flex-wrap: wrap; }
    .main-btn, .action-btn { min-width: 180px; }
  }
</style>
</head>
<body class="theme-terron">

  <div class="top-symbol">
    <img id="symbolImg" src="" alt="symbol">
  </div>

  <h1 class="accent-text">D0M1NAT0R</h1>

  <div class="content-wrapper">

    <textarea id="input" placeholder="Введите текст (русский или зашифрованный)..."></textarea>

    <div class="buttons">
      <button class="main-btn" onclick="doEncrypt()">ЗАШИФРОВАТЬ</button>
      <button class="main-btn" onclick="doDecrypt()">РАСШИФРОВАТЬ</button>
    </div>

    <div class="input-field">
      <input id="cipherKey" type="text" placeholder="Введите ключ шифрования (до шести латинских букв)...">
    </div>

    <textarea id="output" placeholder="Результат появится здесь..."></textarea>

    <div class="action-buttons">
      <button class="action-btn" onclick="copyOutput()">КОПИРОВАТЬ</button>
      <button class="action-btn" onclick="reverseOperation()">ПЕРЕВЕРНУТЬ</button>
    </div>

    <table class="examples-table">
      <thead>
        <tr>
          <th>Пример ключа</th>
          <th>Пример шифрования текста</th>
        </tr>
      </thead>
      <tbody id="examplesBody"></tbody>
    </table>

  </div>

<script>
const themes = [
  { name: "keller", color: "#8AA3F4", symbol: "https://i.postimg.cc/SsSFQSbb/symbol-Keller.webp" },
  { name: "blazer", color: "#E63E3E", symbol: "https://i.postimg.cc/5ymDZDRk/symbol_Blazer.webp" },
  { name: "terron", color: "#44FF4E", symbol: "https://i.postimg.cc/pXbNyJH3/symbol_Terron.webp" }
];

const randomTheme = themes[Math.floor(Math.random() * themes.length)];
const currentTheme = randomTheme.name;

document.body.className = `theme-${currentTheme}`;
document.getElementById("symbolImg").src = randomTheme.symbol;

const baseMap = {
  'А': ['A', '2', '@'], 'Б': ['B', '6', '₿'], 'В': ['V', '√'], 'Г': ['G'],
  'Д': ['D'], 'Е': ['E', '9'], 'Ё': ['E', '9'], 'Ж': ['#'], 'З': ['Z'],
  'И': ['I', '1'], 'Й': ['J'], 'К': ['K'], 'Л': ['L', '£'],
  'М': ['M', '8', '&'], 'Н': ['N'], 'О': ['O', '0', '°'], 'П': ['P'],
  'Р': ['R', '₽'], 'С': ['S', '$', '7'], 'Т': ['T'], 'У': ['U', 'Y', '¥'],
  'Ф': ['F', '§'], 'Х': ['H', 'X'], 'Ц': ['C', '¢'], 'Ч': ['4'],
  'Ш': ['W'], 'Щ': ['Щ'], 'Ъ': ['"'], 'Ы': ['Ы'], 'Ь': ["'"],
  'Э': ['3', '€'], 'Ю': ['Ю'], 'Я': ['Я', '!']
};

const allBaseSymbols = new Set();
Object.values(baseMap).forEach(variants => variants.forEach(v => allBaseSymbols.add(v)));
const uniqueBaseSymbols = Array.from(allBaseSymbols);

function seededShuffle(arr, seedStr) {
  let seed = 0;
  for (let i = 0; i < seedStr.length; i++) {
    seed = (seed * 31 + seedStr.charCodeAt(i)) % 2147483647;
  }
  let shuffled = [...arr];
  for (let i = shuffled.length - 1; i > 0; i--) {
    seed = (seed * 9301 + 49297) % 233280;
    const j = Math.floor((seed / 233280) * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

function getMapForKey(keyInput) {
  const k = (keyInput || '').toUpperCase().trim();
  let mapCopy = JSON.parse(JSON.stringify(baseMap));

  if (k === 'RANGER' || k === '') {
    if (mapCopy['Ё']) delete mapCopy['Ё'];
    return mapCopy;
  }

  const shuffled = seededShuffle(uniqueBaseSymbols, k);
  const substitution = {};
  uniqueBaseSymbols.forEach((oldSym, i) => substitution[oldSym] = shuffled[i]);

  const modified = {};
  for (let letter in mapCopy) {
    modified[letter] = mapCopy[letter].map(old => substitution[old] || old);
  }
  if (modified['Ё']) delete modified['Ё'];
  return modified;
}

function buildReverseMap(modMap) {
  const rev = {};
  for (const letter in modMap) {
    modMap[letter].forEach(v => { if (!rev[v]) rev[v] = letter; });
  }
  return rev;
}

function getCipherConfig(keyInput) {
  const m = getMapForKey(keyInput);
  const r = buildReverseMap(m);
  const multi = new Set(Object.keys(m).filter(l => m[l].length >= 2));
  return { map: m, reverse: r, multi };
}

function isValidKey(key) {
  const cleaned = (key || '').trim().toUpperCase();
  if (cleaned === '' || cleaned === 'RANGER') return true;
  return /^[A-Z]{6}$/.test(cleaned);
}

function doEncrypt() {
  const input = document.getElementById('input').value;
  if (!input) return;

  const key = document.getElementById('cipherKey').value;
  if (!isValidKey(key)) {
    document.getElementById('output').value = "Неверный ключ шифрования. Попробуйте обновить Интерком или используйте другой ключ";
    return;
  }

  const config = getCipherConfig(key);

  const tokens = input.split(/(\s+)/);
  const processed = tokens.map(token => {
    if (/^\s+$/.test(token)) return token;

    let word = token.toUpperCase();
    let punct = '';

    const match = word.match(/([!?.:,;—]+)$/);
    if (match) {
      punct = '*';
      word = word.slice(0, -match[0].length);
    }

    if (!/[А-ЯЁ]/.test(word)) return token;

    let encoded = '';
    let alreadyDuplicated = false;

    for (let i = 0; i < word.length; i++) {
      let char = word[i];
      if (char === 'Ё') char = 'Е';

      const variants = config.map[char] || [char];
      const selected = variants[i % variants.length];

      if (variants.length >= 2 && !alreadyDuplicated && Math.random() < 0.15) {
        const repeats = Math.floor(Math.random() * 3) + 2;
        for (let r = 0; r < repeats; r++) encoded += selected;
        alreadyDuplicated = true;
      } else {
        encoded += selected;
      }
    }

    encoded = encoded.split('').reverse().join('');
    return encoded + punct;
  });

  document.getElementById('output').value = 'DOM-' + processed.join('') + '-INTRUDER';
}

function doDecrypt() {
  const input = document.getElementById('input').value.trim();
  const lowerInput = input.toLowerCase();

  const themeEggs = easterEggs[currentTheme] || [];
  for (const egg of themeEggs) {
    for (const key of egg.keys) {
      if (lowerInput === key || lowerInput.includes(key)) {
        document.getElementById('output').value = egg.message;
        return;
      }
    }
  }

  const key = document.getElementById('cipherKey').value;
  if (!isValidKey(key)) {
    document.getElementById('output').value = "Неверный ключ шифрования. Попробуйте обновить Интерком или используйте другой ключ";
    return;
  }

  const config = getCipherConfig(key);

  if (!input.startsWith('DOM-') || !input.endsWith('-INTRUDER')) {
    document.getElementById('output').value = "Неверное шифрование. Пожалуйста, установите или обновите программу Интеркома";
    return;
  }

  let cleaned = input.slice(4, -'-INTRUDER'.length);

  const tokens = cleaned.split(/(\s+)/);
  const processed = tokens.map(token => {
    if (/^\s+$/.test(token)) return token;

    let encWord = token;
    let punct = '';

    if (token.endsWith('*')) {
      punct = '.';
      encWord = token.slice(0, -1);
    }

    const originalOrder = encWord.split('').reverse().join('');
    let decoded = '';
    let prevEncChar = null;

    for (let char of originalOrder) {
      const letter = config.reverse[char] || char;

      if (prevEncChar === char && config.multi.has(letter)) {
        continue;
      }

      decoded += letter;
      prevEncChar = char;
    }

    return decoded + punct;
  });

  document.getElementById('output').value = processed.join('');
}

function copyOutput() {
  const output = document.getElementById('output');
  if (!output.value) return;
  navigator.clipboard.writeText(output.value);
}

function reverseOperation() {
  const output = document.getElementById('output').value.trim();
  if (!output) return;

  document.getElementById('input').value = output;

  if (output.startsWith('DOM-') && output.endsWith('-INTRUDER')) {
    doDecrypt();
  } else {
    doEncrypt();
  }
}

const easterEggs = {
  keller: [
    { keys: ["келлер", "keller"], message: "Связь с Командным центром невозможна, объект находится в гиперпространстве." },
    { keys: ["махпелла", "mahpella", "клиссаны", "klissan"], message: "информация получена, маршрут в соседний рукав галактики откалиброван, активирован протокол сбора информации." }
  ],
  blazer: [
    { keys: ["блазер", "blazer"], message: "Сигнал отправлен. Ожидайте прибытия флота ликвидации." }
  ],
  terron: [
    { keys: ["террон", "terron"], message: "Запрос на ассимиляцию обрабатывается, ожидайте ответного протокола." }
  ]
};

const exampleText = "Когда летишь в бездонной черноте космоса, утыканной сиянием далеких звезд в свете протуберанцев может открыться истина — это и есть вечность";

const keys = ["Ranger", "Keller", "Blazer", "Terron", "Galaxy", "Quasar", "Pulsar"];

window.addEventListener('load', () => {
  const tbody = document.getElementById('examplesBody');

  const trOriginal = document.createElement('tr');
  trOriginal.innerHTML = `<td class="original">Origin</td><td class="original">${exampleText}</td>`;
  tbody.appendChild(trOriginal);

  keys.forEach(key => {
    const config = getCipherConfig(key);

    let encoded = '';
    const tokens = exampleText.split(/(\s+)/);
    const processed = tokens.map(token => {
      if (/^\s+$/.test(token)) return token;

      let word = token.toUpperCase();
      let punct = '';

      const match = word.match(/([!?.:,;—]+)$/);
      if (match) {
        punct = '*';
        word = word.slice(0, -match[0].length);
      }

      if (!/[А-ЯЁ]/.test(word)) return token;

      let part = '';
      let alreadyDuplicated = false;

      for (let i = 0; i < word.length; i++) {
        let char = word[i];
        if (char === 'Ё') char = 'Е';
        const variants = config.map[char] || [char];
        const selected = variants[i % variants.length];

        if (variants.length >= 2 && !alreadyDuplicated && Math.random() < 0.15) {
          const repeats = Math.floor(Math.random() * 3) + 2;
          for (let r = 0; r < repeats; r++) part += selected;
          alreadyDuplicated = true;
        } else {
          part += selected;
        }
      }

      part = part.split('').reverse().join('');
      return part + punct;
    });

    encoded = 'DOM-' + processed.join('') + '-INTRUDER';

    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${key}</td><td style="word-break: break-all;">${encoded}</td>`;
    tbody.appendChild(tr);
  });
});
</script>

</body>
</html>
